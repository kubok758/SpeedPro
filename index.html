<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest RU (Только Frontend)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #eab308; /* Желтый цвет для RU-темы */
            --accent-hover: #ca8a04;
            --disabled: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 24px; }
        .description { font-size: 13px; color: #94a3b8; margin-bottom: 30px; line-height: 1.4; }
        
        .results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .metric {
            background-color: #0f172a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            position: relative;
        }
        .metric.disabled {
            opacity: 0.5;
        }
        .metric-title {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .metric-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
        }
        .metric-unit {
            font-size: 16px;
            color: #64748b;
            font-weight: normal;
        }
        .notice {
            font-size: 11px;
            color: #ef4444;
            margin-top: 5px;
        }
        
        button {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        button:disabled { background-color: var(--disabled); cursor: not-allowed; color: #94a3b8; transform: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Скорость интернета</h1>
        <div class="description">Замер через инфраструктуру Yandex<br>(Без обхода блокировок и VPN)</div>
        
        <div class="results">
            <div class="metric">
                <div class="metric-title">Пинг (МСК/СПБ)</div>
                <div class="metric-value" id="pingResult">-- <span class="metric-unit">мс</span></div>
            </div>
            <div class="metric">
                <div class="metric-title">Скачивание (Оценочно)</div>
                <div class="metric-value" id="dlResult">-- <span class="metric-unit">Мбит/с</span></div>
            </div>
            <div class="metric disabled">
                <div class="metric-title">Загрузка</div>
                <div class="metric-value">N/A</div>
                <div class="notice">Недоступно без бэкенда</div>
            </div>
        </div>

        <button id="startBtn" onclick="runTest()">Начать замер</button>
    </div>

    <script>
        // Используем CDN Яндекса. Он гарантированно быстро работает в РФ и отдает CORS-заголовки.
        const YANDEX_PING = 'https://yastatic.net/s3/home/logos/share/share-logo_ru.png';
        const YANDEX_DL = 'https://yastatic.net/react/18.2.0/react-dom.production.min.js'; // ~120KB файл

        const getCacheBuster = () => `?cb=${Math.random().toString(36).substring(2)}`;

        async function measurePing() {
            const start = performance.now();
            await fetch(YANDEX_PING + getCacheBuster(), { mode: 'cors' });
            return Math.round(performance.now() - start);
        }

        async function measureDownload() {
            const start = performance.now();
            
            // Запускаем скачивание файла 15 раз параллельно, чтобы создать нагрузку на канал
            const requests = Array.from({ length: 15 }).map(() => 
                fetch(YANDEX_DL + getCacheBuster(), { mode: 'cors' }).then(res => res.blob())
            );
            
            const blobs = await Promise.all(requests);
            const end = performance.now();
            
            const totalBytes = blobs.reduce((acc, blob) => acc + blob.size, 0);
            const durationInSeconds = (end - start) / 1000;
            const bitsLoaded = totalBytes * 8;
            const speedMbps = (bitsLoaded / durationInSeconds) / 1000000;
            
            return speedMbps.toFixed(2);
        }

        async function runTest() {
            const btn = document.getElementById('startBtn');
            const pingEl = document.getElementById('pingResult');
            const dlEl = document.getElementById('dlResult');

            btn.disabled = true;
            btn.innerText = 'Измерение...';
            pingEl.innerHTML = '... <span class="metric-unit">мс</span>';
            dlEl.innerHTML = '... <span class="metric-unit">Мбит/с</span>';

            try {
                // Разогревочный запрос
                await measurePing(); 
                
                // Измеряем пинг
                const ping = await measurePing();
                pingEl.innerHTML = `${ping} <span class="metric-unit">мс</span>`;

                // Измеряем скачивание
                const downloadSpeed = await measureDownload();
                dlEl.innerHTML = `${downloadSpeed} <span class="metric-unit">Мбит/с</span>`;

            } catch (error) {
                console.error("Ошибка:", error);
                alert("Ошибка соединения. Убедитесь, что у вас есть доступ к сети.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'Повторить замер';
            }
        }
    </script>
</body>
</html>
